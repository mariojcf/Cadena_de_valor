<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Cadena de Valor - Donovan Werke</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .section-title { font-weight: bold; color: #2980b9; margin-top: 20px; display: block; text-transform: uppercase; font-size: 0.9em; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85em; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; margin-top: 20px; font-weight: bold; }
        button:hover { background-color: #219150; }
        #resultado { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; }
        .res-box { background: #ecf0f1; border-left: 5px solid #2980b9; padding: 15px; }
        .alert { background: #fdf2e9; border-left: 5px solid #e67e22; padding: 15px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Sistema de Auditoría: Cadena de Valor</h1>
    <p style="text-align: center; font-size: 0.9em; color: #666;">Implementación Técnica para el Análisis de Procesos Farmacéuticos</p>

    <div class="section-title">Actividades Primarias (Costos Q)</div>
    <div class="input-group">
        <div><label>Logística Interna</label><input type="number" id="logInt" placeholder="Ej. 5000"></div>
        <div><label>Operaciones (Producción)</label><input type="number" id="ops" placeholder="Ej. 15000"></div>
        <div><label>Logística Externa</label><input type="number" id="logExt" placeholder="Ej. 3000"></div>
        <div><label>Marketing y Ventas</label><input type="number" id="mkt" placeholder="Ej. 4000"></div>
    </div>

    <div class="section-title">Actividades de Soporte (Costos Q)</div>
    <div class="input-group">
        <div><label>Infraestructura / RRHH</label><input type="number" id="soporte" placeholder="Ej. 2000"></div>
        <div><label>Desarrollo (I+D)</label><input type="number" id="tecnologia" placeholder="Ej. 1500"></div>
    </div>

    <div class="section-title">Ingresos Totales</div>
    <input type="number" id="ingresos" placeholder="Valor total generado por la venta del lote (Q)">

    <button onclick="calcularAnalisis()">EJECUTAR ANÁLISIS CUANTITATIVO Y DESCRIPTIVO</button>

    <div id="resultado">
        <div class="res-box" id="resCuantitativo"></div>
        <div class="alert" id="resDescriptivo"></div>
    </div>
</div>

<script>
    function calcularAnalisis() {
        // Obtención de valores
        const lI = parseFloat(document.getElementById('logInt').value) || 0;
        const op = parseFloat(document.getElementById('ops').value) || 0;
        const lE = parseFloat(document.getElementById('logExt').value) || 0;
        const mk = parseFloat(document.getElementById('mkt').value) || 0;
        const sp = parseFloat(document.getElementById('soporte').value) || 0;
        const tc = parseFloat(document.getElementById('tecnologia').value) || 0;
        const totalIngresos = parseFloat(document.getElementById('ingresos').value) || 0;

        const costoTotal = lI + op + lE + mk + sp + tc;
        const margen = totalIngresos - costoTotal;
        const margenPorc = ((margen / totalIngresos) * 100).toFixed(2);

        // Mostrar sección de resultados
        document.getElementById('resultado').style.display = 'block';

        // Análisis Cuantitativo
        document.getElementById('resCuantitativo').innerHTML = `
            <strong>ANÁLISIS CUANTITATIVO:</strong><br>
            Costo Total de Operación: Q${costoTotal.toLocaleString()}<br>
            Margen de Utilidad: Q${margen.toLocaleString()} (${margenPorc}%)
        `;

        // Análisis Descriptivo (Lógica de software)
        let diagnostico = "<strong>ANÁLISIS DESCRIPTIVO:</strong><br>";
        if (op > (costoTotal * 0.5)) {
            diagnostico += "- La actividad de <b>Operaciones</b> concentra más del 50% del costo. Se recomienda optimización mediante automatización de líneas de llenado.";
        } else if (lI > lE) {
            diagnostico += "- El costo de <b>Logística Interna</b> es elevado. Revisar eficiencia en recepción de materia prima.";
        } else {
            diagnostico += "- Distribución de costos equilibrada. Enfocar esfuerzos en el margen de diferenciación tecnológica.";
        }

        document.getElementById('resDescriptivo').innerHTML = diagnostico;
    }
</script>

</body>
</html>
