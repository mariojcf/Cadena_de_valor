<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría de Valor - Donovan Werke</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-primary { background-color: #0d6efd; border: none; padding: 12px; font-weight: bold; }
        .btn-success { background-color: #198754; border: none; padding: 12px; font-weight: bold; }
        .header-section { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); color: white; padding: 40px 0; border-radius: 0 0 30px 30px; margin-bottom: 30px; }
        .result-badge { font-size: 1.2rem; padding: 15px; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="header-section text-center">
    <div class="container">
        <h1 class="display-5 fw-bold">Sistema de Auditoría de Valor (SAV)</h1>
        <p class="lead">Optimización de Cadena de Valor para Industria Farmacéutica</p>
    </div>
</div>

<div class="container mb-5" id="contenido-pdf">
    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card p-4 h-100">
                <h4 class="mb-4 text-primary border-bottom pb-2">Entrada de Datos</h4>
                
                <h6 class="fw-bold text-secondary mt-3">ACTIVIDADES PRIMARIAS (Q)</h6>
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">Logística Interna</label><input type="number" id="logInt" class="form-control" placeholder="8500"></div>
                    <div class="col-md-6"><label class="form-label">Operaciones</label><input type="number" id="ops" class="form-control" placeholder="22000"></div>
                    <div class="col-md-6"><label class="form-label">Logística Externa</label><input type="number" id="logExt" class="form-control" placeholder="4500"></div>
                    <div class="col-md-6"><label class="form-label">Marketing y Ventas</label><input type="number" id="mkt" class="form-control" placeholder="6000"></div>
                </div>

                <h6 class="fw-bold text-secondary mt-4">ACTIVIDADES DE SOPORTE (Q)</h6>
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">Infraestructura/RRHH</label><input type="number" id="soporte" class="form-control" placeholder="3500"></div>
                    <div class="col-md-6"><label class="form-label">Desarrollo (I+D)</label><input type="number" id="tecnologia" class="form-control" placeholder="2000"></div>
                </div>

                <div class="mt-4">
                    <label class="form-label fw-bold">Ingresos Totales (Venta de Lote)</label>
                    <input type="number" id="ingresos" class="form-control form-control-lg border-primary" placeholder="65000">
                </div>

                <button class="btn btn-primary mt-4 w-100" onclick="ejecutarAnalisis()">CALCULAR ESTRATEGIA</button>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card p-4 h-100 bg-white" id="seccion-resultados">
                <h4 class="mb-4 text-primary border-bottom pb-2">Diagnóstico de Valor</h4>
                <div id="pantalla-inicial" class="text-center py-5">
                    <p class="text-muted">Ingrese los datos para generar el reporte estratégico.</p>
                </div>
                
                <div id="resultados-finales" style="display:none;">
                    <div class="alert alert-info" id="resCuantitativo"></div>
                    <div class="alert alert-warning" id="resDescriptivo"></div>
                    
                    <button class="btn btn-success w-100 mt-3" onclick="descargarReporte()">
                        <i class="bi bi-file-pdf"></i> DESCARGAR REPORTE EN PDF
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
    function ejecutarAnalisis() {
        const lI = parseFloat(document.getElementById('logInt').value) || 0;
        const op = parseFloat(document.getElementById('ops').value) || 0;
        const lE = parseFloat(document.getElementById('logExt').value) || 0;
        const mk = parseFloat(document.getElementById('mkt').value) || 0;
        const sp = parseFloat(document.getElementById('soporte').value) || 0;
        const tc = parseFloat(document.getElementById('tecnologia').value) || 0;
        const totalIngresos = parseFloat(document.getElementById('ingresos').value) || 0;

        const costoTotal = lI + op + lE + mk + sp + tc;
        const margen = totalIngresos - costoTotal;
        const margenPorc = totalIngresos > 0 ? ((margen / totalIngresos) * 100).toFixed(2) : 0;

        document.getElementById('pantalla-inicial').style.display = 'none';
        document.getElementById('resultados-finales').style.display = 'block';

        document.getElementById('resCuantitativo').innerHTML = `
            <h5>Análisis Cuantitativo</h5>
            <hr>
            <p><strong>Costo Operativo:</strong> Q${costoTotal.toLocaleString()}</p>
            <p><strong>Margen Neto:</strong> Q${margen.toLocaleString()}</p>
            <p class="h4"><strong>Eficiencia: ${margenPorc}%</strong></p>
        `;

        let diagnostico = "<h5>Análisis Descriptivo</h5><hr>";
        if (op > (costoTotal * 0.45)) {
            diagnostico += "Se identifica una <b>concentración crítica</b> en Producción. Se recomienda automatización industrial para mejorar el margen.";
        } else if (mk > (costoTotal * 0.20)) {
            diagnostico += "El gasto en Marketing es alto. Revisar efectividad de la fuerza de ventas médica.";
        } else {
            diagnostico += "Cadena de valor optimizada. Se sugiere reinvertir en I+D para nuevos fármacos.";
        }
        document.getElementById('resDescriptivo').innerHTML = diagnostico;
    }

    function descargarReporte() {
        const elemento = document.getElementById('contenido-pdf');
        const opciones = {
            margin: 0.5,
            filename: 'Reporte_Cadena_Valor_Donovan.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opciones).from(elemento).save();
    }
</script>

</body>
</html>
